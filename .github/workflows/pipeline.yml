name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Configure Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Required Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: Static Code Analysis (SAST - Bandit)
        run: bandit -r . -ll
        continue-on-error: true

      - name: Dependency Vulnerability Scan
        run: safety check --full-report
        continue-on-error: true

      - name: Build Application Docker Image
        run: docker build -t devsecops-app:latest .

      - name: Run Application Container
        run: |
          docker run -d -p 8000:5000 devsecops-app:latest
          sleep 20

      - name: Fix Permissions for ZAP
        run: sudo chmod -R 777 $GITHUB_WORKSPACE

      - name: Container Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:latest
        continue-on-error: true

      - name: DAST Scan using OWASP ZAP
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://127.0.0.1:8000"
          fail_action: false
          artifact_name: "zap-report"
        env:
          HOME: /tmp